name: CI

# Repo public → logs Actions lisibles sans token.
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  tests:
    name: Unit tests (stdlib, 0 dépendance)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run unit tests
        run: python -m unittest discover -s shared/agent/tests -t . -v
