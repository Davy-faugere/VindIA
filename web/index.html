<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>VindIA — assistant vocal</title>
<meta name="theme-color" content="#4F46E5" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="VindIA" />
<style>
  :root{
    --primary:#4F46E5; --primary-hover:#4338CA; --accent:#8B5CF6;
    --soft:#EEF0FF; --bg:#fafafe; --text:#1B1E2B; --muted:#6b7280; --radius:20px;
    --font:'Inter','Inter Variable',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:var(--font); color:var(--text);
    background:radial-gradient(1200px 700px at 50% -10%, var(--soft), var(--bg) 60%);
    display:flex; align-items:center; justify-content:center; padding:24px;
    -webkit-tap-highlight-color:transparent;
  }
  .card{
    width:100%; max-width:440px; text-align:center; background:#fff;
    border:1px solid #ececf6; border-radius:var(--radius);
    box-shadow:0 20px 50px rgba(79,70,229,.10); padding:32px 24px 28px;
  }
  .brand{display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:4px}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--accent)}
  h1{font-size:22px; font-weight:800; margin:0; letter-spacing:-.02em}
  .sub{color:var(--muted); font-size:14px; margin:6px 0 26px}

  .orb-wrap{position:relative; width:180px; height:180px; margin:0 auto 8px}
  .orb{
    position:absolute; inset:0; margin:auto; width:140px; height:140px; border-radius:50%;
    border:none; cursor:pointer; color:#fff; font-weight:700; font-size:16px;
    background:linear-gradient(145deg,var(--primary),var(--accent));
    box-shadow:0 12px 30px rgba(79,70,229,.35); transition:transform .15s ease, box-shadow .2s;
    display:flex; align-items:center; justify-content:center;
  }
  .orb:active{transform:scale(.97)}
  .orb:disabled{opacity:.7; cursor:default}
  .ring{position:absolute; inset:0; margin:auto; width:140px;height:140px;border-radius:50%;
    border:3px solid var(--accent); opacity:0; pointer-events:none}
  body[data-state="listening"] .ring{animation:pulse 1.8s ease-out infinite}
  body[data-state="speaking"] .orb{animation:breathe 1.2s ease-in-out infinite}
  body[data-state="thinking"] .orb{animation:breathe 1s ease-in-out infinite}
  @keyframes pulse{0%{opacity:.5;transform:scale(1)}100%{opacity:0;transform:scale(1.45)}}
  @keyframes breathe{0%,100%{box-shadow:0 12px 30px rgba(79,70,229,.35)}50%{box-shadow:0 12px 46px rgba(139,92,246,.65)}}

  .state{margin:16px 0 0; font-size:15px; font-weight:600; min-height:22px}
  .state .live{color:var(--primary)}
  .hint{color:var(--muted); font-size:12.5px; margin-top:8px; line-height:1.5}
  .transcript{
    margin-top:22px; text-align:left; background:var(--soft); border-radius:14px;
    padding:14px 16px; font-size:14px; line-height:1.55; max-height:240px; overflow:auto; display:none;
  }
  .transcript.show{display:block}
  .transcript p{margin:0 0 10px}
  .transcript .you b{color:var(--text)}
  .transcript .ai b{color:var(--primary)}
  .typebar{display:flex; gap:8px; margin-top:16px}
  .typebar input{flex:1; padding:11px 14px; border:1px solid #e5e7eb; border-radius:12px; font:inherit; font-size:14px; outline:none}
  .typebar input:focus{border-color:var(--accent)}
  .typebar button{padding:0 16px; border:none; border-radius:12px; background:var(--primary); color:#fff; font-weight:600; cursor:pointer}
  .projbar{display:flex; gap:8px; margin-top:14px; align-items:center}
  .projbar select{flex:1; padding:9px 12px; border:1px solid #e5e7eb; border-radius:12px; font:inherit; font-size:13px; background:#fff; outline:none; color:#374151}
  .projbar select:focus{border-color:var(--accent)}
  .projbar button{padding:9px 13px; border:1px solid #e5e7eb; border-radius:12px; background:#fff; color:var(--primary); font:inherit; font-size:13px; font-weight:600; cursor:pointer}
  .projbar button:hover{border-color:var(--accent)}
  .dl{display:inline-block; margin-top:4px; padding:9px 14px; background:var(--primary); color:#fff;
    border-radius:10px; text-decoration:none; font-weight:600; font-size:13.5px}
  .dl:active{background:var(--primary-hover)}
  .switch{margin-top:16px; background:none; border:none; color:var(--muted); font:inherit;
    font-size:12.5px; text-decoration:underline; cursor:pointer}
  .pending{display:none; margin-top:16px; text-align:left; background:#fff;
    border:1.5px solid var(--accent); border-radius:14px; padding:13px 15px;
    box-shadow:0 8px 22px rgba(139,92,246,.16)}
  .pending.show{display:block}
  .pending-text{font-size:15px; line-height:1.5; color:var(--text); min-height:21px; margin-bottom:11px}
  .pending-text:empty::before{content:'…'; color:var(--muted)}
  .pending-actions{display:flex; gap:8px}
  .pbtn{flex:1; padding:11px; border:none; border-radius:11px; font:inherit; font-size:14px; font-weight:700; cursor:pointer}
  .pbtn.cancel{background:#f1f1f7; color:var(--text)}
  .pbtn.cancel:active{background:#e7e7f0}
  .pbtn.send{background:var(--primary); color:#fff}
  .pbtn.send:active{background:var(--primary-hover)}
  .pending-bar{height:3px; background:#ececf6; border-radius:3px; margin-top:11px; overflow:hidden}
  .pending-bar span{display:block; height:100%; width:100%; background:var(--accent); transform-origin:left}
  .pending-bar span.run{transition:transform var(--confirm,4000ms) linear; transform:scaleX(0)}
  .err{color:#b91c1c; font-size:13px; margin-top:12px; min-height:18px}
  footer{margin-top:18px; font-size:11px; color:var(--muted)}
</style>
</head>
<body data-state="idle">
  <main class="card">
    <div class="brand"><span class="dot"></span><h1>VindIA</h1></div>
    <p class="sub" id="sub">Assistant vocal — en français</p>

    <div class="orb-wrap">
      <span class="ring"></span>
      <button id="orb" class="orb">Démarrer</button>
    </div>

    <div class="state" id="state">Prêt</div>
    <p class="hint" id="hint">Appuie une fois, puis parle librement — VindIA t'écoute et te répond en continu.</p>
    <div class="err" id="err"></div>

    <div class="pending" id="pending">
      <div class="pending-text" id="pendingText"></div>
      <div class="pending-actions">
        <button id="cancelBtn" class="pbtn cancel">Annuler</button>
        <button id="sendNowBtn" class="pbtn send">Envoyer</button>
      </div>
      <div class="pending-bar"><span id="pendingFill"></span></div>
    </div>

    <div class="transcript" id="transcript"></div>

    <div class="projbar" id="projbar">
      <select id="projSelect" title="Projet actif">
        <option value="">Sans projet</option>
      </select>
      <button id="newProjBtn" type="button" title="Créer un projet">Nouveau</button>
      <button id="attachBtn" type="button" title="Joindre un fichier au projet">Joindre</button>
      <input id="fileInput" type="file" hidden
             accept=".txt,.md,.csv,.tsv,.log,.json,.yaml,.yml,.html,.htm,.docx,.xlsx,.pptx,.pdf" />
    </div>

    <div class="typebar">
      <input id="textInput" type="text" placeholder="…ou écris ton message" />
      <button id="sendBtn">Envoyer</button>
    </div>

    <button id="switchAccount" class="switch">Changer de compte</button>
    <footer>VindIA — voix française naturelle</footer>
  </main>

<script>
(() => {
  // Code d'accès (verrou) : demandé une fois, gardé localement sur l'appareil.
  function getCode() {
    let c = localStorage.getItem('vindia_code');
    if (!c) { c = (prompt("Code d'accès VindIA :") || '').trim(); if (c) localStorage.setItem('vindia_code', c); }
    return c;
  }
  const $ = (id) => document.getElementById(id);
  const body = document.body, orb = $('orb'), stateEl = $('state'), hint = $('hint'),
        errEl = $('err'), tr = $('transcript'), textInput = $('textInput'), sendBtn = $('sendBtn'),
        sub = $('sub');

  // ── Identification au démarrage ───────────────────────────────────────────
  let _displayName = '';
  async function resolveIdentity(code) {
    if (!code) return;
    try {
      const r = await fetch('/auth', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code })
      });
      if (r.status === 401) { localStorage.removeItem('vindia_code'); return; }
      const d = await r.json();
      if (d.ok) {
        _displayName = d.display_name || '';
        sub.textContent = _displayName ? 'Bonjour ' + _displayName + ' — VindIA est prêt' : 'Assistant vocal — en français';
        if (d.has_memory) hint.textContent = "Je me souviens de nos échanges précédents. Appuie pour commencer.";
      }
    } catch (e) { /* serveur non dispo : mode dégradé silencieux */ }
  }
  resolveIdentity(localStorage.getItem('vindia_code') || getCode());

  // Retire tout markdown/symbole (Mistral désobéit au prompt, on nettoie côté client)
  const clean = (t) => (t || '')
    .replace(/\*\*([^*]+)\*\*/g, '$1')          // **gras** → texte
    .replace(/\*([^*]+)\*/g, '$1')              // *italique* → texte
    .replace(/__([^_]+)__/g, '$1')              // __gras__ → texte
    .replace(/_([^_]+)_/g, '$1')               // _italique_ → texte
    .replace(/~~([^~]+)~~/g, '$1')             // ~~barré~~ → texte
    .replace(/`+/g, '')                         // backticks
    .replace(/^#{1,6}\s*/gm, '')               // titres
    .replace(/^\s*[-•*]\s+/gm, '')             // puces
    .replace(/^\s*\d+\.\s+/gm, '')             // listes numérotées (1. 2. 3.)
    .replace(/^\s*>\s*/gm, '')                 // blockquotes
    .replace(/\|[^\n]+\|/g, '')                // lignes de tableaux |col|col|
    .replace(/^[-|: ]+$/gm, '')               // séparateurs de tableaux
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')  // [liens](url) → texte
    .replace(/—/g, ',')                        // tiret em (lu "tiret" par la voix)
    .replace(/\p{Extended_Pictographic}/gu, '')
    .replace(/[\u{1F1E6}-\u{1F1FF}\u{1F3FB}-\u{1F3FF}\u{FE00}-\u{FE0F}\u{20E3}\u{200D}]/gu, '')
    .replace(/\n{2,}/g, '. ')                  // sauts de ligne multiples → pause naturelle
    .replace(/[ \t]{2,}/g, ' ')
    .replace(/ ([,.!?;:])/g, '$1')
    .trim();

  // Ajoute le bouton de telechargement pour un blob deja pret
  function addDownloadButton(name, blob) {
    const url = URL.createObjectURL(blob);
    tr.classList.add('show');
    const p = document.createElement('p');
    const a = document.createElement('a');
    a.href = url; a.download = name; a.className = 'dl'; a.textContent = 'Telecharger ' + name;
    p.appendChild(a); tr.appendChild(p); tr.scrollTop = tr.scrollHeight;
  }

  // Formats bureautiques construits cote serveur (vrais binaires Word/Excel/PowerPoint/PDF)
  const OFFICE = ['docx', 'xlsx', 'pptx', 'pdf'];

  // Propose un fichier genere au telechargement.
  // Texte -> blob cote client. Bureautique -> /build cote serveur (rien stocke).
  async function offerDownload(name, content) {
    const ext = (name.split('.').pop() || 'txt').toLowerCase();
    if (OFFICE.includes(ext)) {
      try {
        const r = await fetch('/build', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: name, content: content })
        });
        if (!r.ok) throw new Error('build ' + r.status);
        addDownloadButton(name, await r.blob());
        return;
      } catch (e) {
        // Repli : on livre le contenu brut en .txt pour ne rien perdre
        const fb = name.replace(/\.[^.]+$/, '') + '.txt';
        addDownloadButton(fb, new Blob([content], { type: 'text/plain;charset=utf-8' }));
        return;
      }
    }
    const mimes = { md:'text/markdown', csv:'text/csv', json:'application/json',
      sh:'text/x-shellscript', bash:'text/x-shellscript', txt:'text/plain', yml:'text/yaml', yaml:'text/yaml' };
    const blob = new Blob([content], { type: (mimes[ext] || 'text/plain') + ';charset=utf-8' });
    addDownloadButton(name, blob);
  }

  const setState = (s, label) => { body.dataset.state = s; if (label !== undefined) stateEl.innerHTML = label; };
  const addLine = (who, text) => {
    tr.classList.add('show');
    const p = document.createElement('p');
    p.className = who;
    p.innerHTML = '<b>' + (who === 'ai' ? 'VindIA' : 'Toi') + '</b> : ' + text;
    tr.appendChild(p); tr.scrollTop = tr.scrollHeight;
  };

  // ── Projets & fichiers : espace privé, persistant, isolé par utilisateur ──
  const projSelect = $('projSelect'), newProjBtn = $('newProjBtn'),
        attachBtn = $('attachBtn'), fileInput = $('fileInput');

  async function projApi(path, payload) {
    const code = localStorage.getItem('vindia_code') || '';
    const r = await fetch(path, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(Object.assign({ code }, payload || {}))
    });
    if (r.status === 401) { localStorage.removeItem('vindia_code'); throw new Error("code refusé"); }
    return r.json();
  }

  async function loadProjects(selectId) {
    try {
      const d = await projApi('/projects/list');
      projSelect.innerHTML = '<option value="">Sans projet</option>';
      (d.projects || []).forEach(p => {
        const o = document.createElement('option');
        o.value = p.project_id;
        o.textContent = p.name + (p.documents && p.documents.length ? ' (' + p.documents.length + ')' : '');
        projSelect.appendChild(o);
      });
      if (selectId) projSelect.value = selectId;
    } catch (e) { /* serveur indispo : barre projet inerte, pas bloquant */ }
  }

  projSelect.addEventListener('change', async () => {
    try {
      const d = await projApi('/projects/activate', { project_id: projSelect.value });
      if (d.active) addLine('ai', 'Projet « ' + d.active + ' » activé. Je m\'appuie sur ses documents.');
    } catch (e) { errEl.textContent = e.message; }
  });

  newProjBtn.addEventListener('click', async () => {
    const name = (prompt('Nom du projet :') || '').trim();
    if (!name) return;
    try {
      const d = await projApi('/projects/create', { name });
      await loadProjects(d.project && d.project.project_id);
      projSelect.dispatchEvent(new Event('change'));
    } catch (e) { errEl.textContent = e.message; }
  });

  attachBtn.addEventListener('click', () => {
    if (!projSelect.value) { errEl.textContent = "Choisis ou crée d'abord un projet."; return; }
    errEl.textContent = '';
    fileInput.click();
  });

  fileInput.addEventListener('change', async () => {
    const f = fileInput.files[0];
    if (!f) return;
    const code = localStorage.getItem('vindia_code') || '';
    const fd = new FormData();
    fd.append('code', code);
    fd.append('project_id', projSelect.value);
    fd.append('file', f);
    attachBtn.textContent = '…'; attachBtn.disabled = true;
    try {
      const r = await fetch('/upload', { method: 'POST', body: fd });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || ('upload ' + r.status));
      addLine('ai', 'Document « ' + d.filename + ' » ajouté au projet (' + d.chars + ' caractères lus). Tu peux m\'interroger dessus.');
      await loadProjects(projSelect.value);
    } catch (e) {
      errEl.textContent = 'Échec de l\'ajout : ' + e.message;
    } finally {
      attachBtn.textContent = 'Joindre'; attachBtn.disabled = false;
      fileInput.value = '';
    }
  });

  loadProjects();

  // --- Synthèse vocale (voix FR du navigateur), choisie la plus naturelle ---
  let frVoice = null;
  function pickVoice() {
    const v = speechSynthesis.getVoices().filter(x => /^fr/i.test(x.lang));
    if (!v.length) return;
    const score = (x) => {
      const n = (x.name || '').toLowerCase();
      let s = 0;
      if (n.includes('google')) s += 5;                 // voix réseau Google = douces/naturelles
      if (/natural|enhanced|premium|neural|wavenet/.test(n)) s += 4;
      if (/am[ée]lie|audrey|marie|virginie|c[ée]line|julie|l[ée]a/.test(n)) s += 3; // voix féminines douces
      if (/fr-fr/i.test(x.lang)) s += 1;
      if (x.localService) s -= 1;                        // les locales (eSpeak) sont robotiques
      return s;
    };
    frVoice = v.slice().sort((a, b) => score(b) - score(a))[0];
  }
  if ('speechSynthesis' in window) {
    pickVoice();
    speechSynthesis.onvoiceschanged = pickVoice;
  }
  // Repli : voix du navigateur (si /tts indisponible)
  function browserSpeak(text, after) {
    if (!('speechSynthesis' in window)) { if (after) after(); return; }
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'fr-FR'; if (frVoice) u.voice = frVoice; u.rate = 0.95; u.pitch = 1.1;
    u.onstart = () => setState('speaking', '<span class="live">VindIA parle…</span>');
    u.onend = () => { setState('idle', 'Prêt'); if (after) after(); };
    u.onerror = () => { if (after) after(); };
    speechSynthesis.speak(u);
  }
  // Voix principale : edge-tts (neurale, douce), servie par /tts.
  // Jouée PHRASE PAR PHRASE : la 1re (courte) démarre quasi instantanément,
  // les suivantes se synthétisent en arrière-plan pendant qu'on parle.
  let currentAudio = null;
  let speakToken = 0;   // invalide une lecture en cours quand on en lance/annule une autre

  // Découpe en phrases ; fusionne les fragments trop courts pour ne pas hacher la voix
  function splitSentences(text) {
    const raw = (text.match(/[^.!?…]+[.!?…]+|\S[^.!?…]*$/g) || [text]).map(s => s.trim()).filter(Boolean);
    const out = [];
    for (const s of raw) {
      if (out.length && (out[out.length - 1].length < 28 || s.length < 16)) out[out.length - 1] += ' ' + s;
      else out.push(s);
    }
    return out.length ? out : [text];
  }

  function ttsUrl(text) {
    return fetch('/tts', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }) })
      .then(r => { if (!r.ok) throw new Error('tts ' + r.status); return r.blob(); })
      .then(b => URL.createObjectURL(b));
  }

  function playUrl(url) {
    return new Promise((resolve, reject) => {
      const audio = new Audio(url);
      currentAudio = audio;
      let done = false;
      const finish = (ok) => {
        if (done) return; done = true;
        URL.revokeObjectURL(url);
        ok ? resolve() : reject(new Error('audio'));
      };
      // Fin naturelle ET annulation passent par 'ended'/'pause' : phrase terminée, pas une erreur.
      audio.onended = () => finish(true);
      audio.onpause = () => finish(true);
      audio.onerror = () => finish(false);
      audio.play().catch(() => finish(false));
    });
  }

  async function speak(text, after) {
    const myToken = ++speakToken;
    if ('speechSynthesis' in window) speechSynthesis.cancel();
    if (currentAudio) { try { currentAudio.pause(); } catch (e) {} currentAudio = null; }
    setState('speaking', '<span class="live">VindIA parle…</span>');
    const parts = splitSentences(text);
    let nextUrl = ttsUrl(parts[0]);   // lance la synthèse de la 1re phrase tout de suite
    let played = false;
    try {
      for (let i = 0; i < parts.length; i++) {
        const url = await nextUrl;
        if (myToken !== speakToken) { URL.revokeObjectURL(url); return; }   // annulé
        if (i + 1 < parts.length) nextUrl = ttsUrl(parts[i + 1]);           // prépare la suivante
        await playUrl(url);
        if (myToken !== speakToken) return;                                 // annulé en cours
        played = true;
      }
      setState('idle', 'Prêt'); if (after) after();
    } catch (e) {
      if (myToken !== speakToken) return;            // annulation volontaire : on ne fait rien
      if (!played) { browserSpeak(text, after); }    // rien joué -> secours voix navigateur
      else { setState('idle', 'Prêt'); if (after) after(); }
    }
  }

  // --- Mode mains-libres : on garde la conversation ouverte ---
  let conversing = false;
  const resumeIfConversing = () => { if (conversing) startListening(); };

  // --- Envoi au cerveau (Mistral direct via /ask, avec mémoire long-terme) ---
  async function ask(message) {
    addLine('you', message);
    setState('thinking', '<span class="live">VindIA réfléchit…</span>');
    try {
      const r = await fetch('/ask', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, code: getCode() })
      });
      if (r.status === 401) { localStorage.removeItem('vindia_code'); throw new Error("code d'accès refusé"); }
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      const raw = (data && data.reply) ? data.reply : "(réponse vide)";
      // Fichier eventuel : [[FICHIER:nom.ext]] ... [[/FICHIER]] -> bouton telecharger
      let spoken = raw;
      const m = raw.match(/\[\[FICHIER:([^\]]+)\]\]([\s\S]*?)\[\[\/FICHIER\]\]/);
      if (m) {
        offerDownload(m[1].trim(), m[2].replace(/^\r?\n/, ''));
        spoken = raw.replace(m[0], '').trim() || "Voila, ton fichier est pret a telecharger.";
      }
      const reply = clean(spoken);
      addLine('ai', reply);
      speak(reply, resumeIfConversing);   // quand il a fini de parler, il se remet à écouter
    } catch (e) {
      errEl.textContent = "Problème de connexion : " + (e.message || e);
      setState('idle', 'Prêt');
      resumeIfConversing();
    }
  }

  // --- Reconnaissance vocale (STT navigateur), tolérante aux pauses ---
  const pending = $('pending'), pendingText = $('pendingText'),
        pendingFill = $('pendingFill'), cancelBtn = $('cancelBtn'), sendNowBtn = $('sendNowBtn');
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const SILENCE_MS = 2500;   // silence requis avant de proposer l'envoi (généreux : ne coupe pas aux pauses)
  const CONFIRM_MS = 4500;   // fenêtre pour annuler/corriger avant l'envoi automatique
  let recog = null, finalBuf = '', silenceTimer = null, confirmTimer = null, phase = 'idle';
  pending.style.setProperty('--confirm', CONFIRM_MS + 'ms');

  const clearTimers = () => { clearTimeout(silenceTimer); clearTimeout(confirmTimer); silenceTimer = confirmTimer = null; };
  const hidePending = () => { pending.classList.remove('show'); pendingText.textContent = ''; pendingFill.classList.remove('run'); };

  function startListening() {
    if (!recog || !conversing) return;
    phase = 'listening'; finalBuf = ''; clearTimers(); hidePending();
    try { if ('speechSynthesis' in window) speechSynthesis.cancel(); } catch (e) {}
    try { recog.start(); } catch (e) { /* déjà lancé */ }
    setState('listening', '<span class="live">À l\'écoute…</span>');
    hint.textContent = "Parle tranquillement, prends ton temps. Je n'envoie qu'après une pause.";
  }

  // Silence prolongé → on fige la phrase et on ouvre la fenêtre d'annulation
  function armSilence() {
    clearTimeout(silenceTimer);
    silenceTimer = setTimeout(() => {
      if (finalBuf.trim()) enterConfirm(finalBuf.trim());
    }, SILENCE_MS);
  }

  function enterConfirm(txt) {
    phase = 'confirm';
    try { recog.stop(); } catch (e) {}
    setState('idle', 'À vérifier');
    pendingText.textContent = txt;
    pending.classList.add('show');
    hint.textContent = "J'envoie dans un instant — tu peux annuler et recommencer.";
    pendingFill.classList.remove('run'); void pendingFill.offsetWidth; pendingFill.classList.add('run');
    clearTimeout(confirmTimer);
    confirmTimer = setTimeout(confirmSend, CONFIRM_MS);
  }

  function confirmSend() {
    const txt = pendingText.textContent.trim();
    clearTimers(); hidePending(); phase = 'sending';
    if (txt) ask(txt); else resumeIfConversing();
  }

  function cancelPending() {
    clearTimers(); hidePending();
    if (conversing) startListening();
    else { phase = 'idle'; setState('idle', 'Prêt'); hint.textContent = "Appuie pour reprendre."; }
  }

  if (SR) {
    recog = new SR();
    recog.lang = 'fr-FR'; recog.continuous = true; recog.interimResults = true; recog.maxAlternatives = 1;
    recog.onresult = (ev) => {
      if (phase !== 'listening') return;
      let interim = '';
      for (let i = ev.resultIndex; i < ev.results.length; i++) {
        const res = ev.results[i];
        if (res.isFinal) finalBuf += res[0].transcript + ' ';
        else interim += res[0].transcript;
      }
      pending.classList.add('show');
      pendingText.textContent = (finalBuf + interim).trim();
      armSilence();
    };
    recog.onerror = (ev) => {
      if (ev.error !== 'no-speech' && ev.error !== 'aborted') errEl.textContent = "Micro : " + ev.error;
    };
    // Le navigateur arrête parfois l'écoute tout seul → on relance tant qu'on écoute
    recog.onend = () => { if (conversing && phase === 'listening') { try { recog.start(); } catch (e) {} } };
  } else {
    hint.textContent = "Reconnaissance vocale non dispo sur ce navigateur — utilise la saisie texte ci-dessous.";
  }

  cancelBtn.addEventListener('click', cancelPending);
  sendNowBtn.addEventListener('click', confirmSend);

  function startConversation() {
    conversing = true; orb.textContent = 'Arrêter'; errEl.textContent = '';
    startListening();
  }
  function stopConversation() {
    conversing = false; phase = 'idle'; orb.textContent = 'Démarrer';
    clearTimers(); hidePending();
    speakToken++;   // invalide toute lecture vocale en cours (y compris entre deux phrases)
    if (recog) { try { recog.abort(); } catch (e) {} }
    if ('speechSynthesis' in window) speechSynthesis.cancel();
    if (currentAudio) { try { currentAudio.pause(); } catch (e) {} currentAudio = null; }  // coupe la voix en cours
    setState('idle', 'Prêt');
    hint.textContent = "Conversation en pause. Appuie pour reprendre.";
  }

  orb.addEventListener('click', () => {
    errEl.textContent = '';
    if (!recog) { textInput.focus(); return; }
    conversing ? stopConversation() : startConversation();
  });

  // Changer de compte : sauvegarde la mémoire, oublie le code, redemande un nouveau
  $('switchAccount').addEventListener('click', async () => {
    if (conversing) stopConversation();
    const oldCode = localStorage.getItem('vindia_code');
    if (oldCode) {
      try { await fetch('/session/end', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code: oldCode }) }); } catch (e) {}
    }
    localStorage.removeItem('vindia_code');
    _displayName = '';
    sub.textContent = 'Assistant vocal — en français';
    tr.innerHTML = ''; tr.classList.remove('show');
    errEl.textContent = '';
    const c = getCode();
    if (c) await resolveIdentity(c);
    hint.textContent = c ? (_displayName ? 'Bonjour ' + _displayName + ', appuie pour démarrer.' : 'Compte changé. Appuie pour démarrer.') : 'Aucun code saisi.';
  });

  // PWA : enregistrement du service worker (installable comme une app)
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});

  function sendText() {
    const m = textInput.value.trim();
    if (!m) return;
    textInput.value = '';
    clearTimers(); hidePending();
    if (recog) { try { recog.abort(); } catch (e) {} }
    if (phase === 'listening' || phase === 'confirm') phase = 'sending';
    ask(m);
  }
  sendBtn.addEventListener('click', sendText);
  textInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendText(); });
})();
</script>
</body>
</html>
