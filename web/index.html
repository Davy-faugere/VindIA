<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>VindIA — assistant vocal</title>
<style>
  :root{
    --primary:#4F46E5; --primary-hover:#4338CA; --accent:#8B5CF6;
    --soft:#EEF0FF; --bg:#fafafe; --text:#1B1E2B; --muted:#6b7280; --radius:20px;
    --font:'Inter','Inter Variable',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:var(--font); color:var(--text);
    background:radial-gradient(1200px 700px at 50% -10%, var(--soft), var(--bg) 60%);
    display:flex; align-items:center; justify-content:center; padding:24px;
    -webkit-tap-highlight-color:transparent;
  }
  .card{
    width:100%; max-width:440px; text-align:center; background:#fff;
    border:1px solid #ececf6; border-radius:var(--radius);
    box-shadow:0 20px 50px rgba(79,70,229,.10); padding:32px 24px 28px;
  }
  .brand{display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:4px}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--accent)}
  h1{font-size:22px; font-weight:800; margin:0; letter-spacing:-.02em}
  .sub{color:var(--muted); font-size:14px; margin:6px 0 26px}

  .orb-wrap{position:relative; width:180px; height:180px; margin:0 auto 8px}
  .orb{
    position:absolute; inset:0; margin:auto; width:140px; height:140px; border-radius:50%;
    border:none; cursor:pointer; color:#fff; font-weight:700; font-size:16px;
    background:linear-gradient(145deg,var(--primary),var(--accent));
    box-shadow:0 12px 30px rgba(79,70,229,.35); transition:transform .15s ease, box-shadow .2s;
    display:flex; align-items:center; justify-content:center;
  }
  .orb:active{transform:scale(.97)}
  .orb:disabled{opacity:.7; cursor:default}
  .ring{position:absolute; inset:0; margin:auto; width:140px;height:140px;border-radius:50%;
    border:3px solid var(--accent); opacity:0; pointer-events:none}
  body[data-state="listening"] .ring{animation:pulse 1.8s ease-out infinite}
  body[data-state="speaking"] .orb{animation:breathe 1.2s ease-in-out infinite}
  body[data-state="thinking"] .orb{animation:breathe 1s ease-in-out infinite}
  @keyframes pulse{0%{opacity:.5;transform:scale(1)}100%{opacity:0;transform:scale(1.45)}}
  @keyframes breathe{0%,100%{box-shadow:0 12px 30px rgba(79,70,229,.35)}50%{box-shadow:0 12px 46px rgba(139,92,246,.65)}}

  .state{margin:16px 0 0; font-size:15px; font-weight:600; min-height:22px}
  .state .live{color:var(--primary)}
  .hint{color:var(--muted); font-size:12.5px; margin-top:8px; line-height:1.5}
  .transcript{
    margin-top:22px; text-align:left; background:var(--soft); border-radius:14px;
    padding:14px 16px; font-size:14px; line-height:1.55; max-height:240px; overflow:auto; display:none;
  }
  .transcript.show{display:block}
  .transcript p{margin:0 0 10px}
  .transcript .you b{color:var(--text)}
  .transcript .ai b{color:var(--primary)}
  .typebar{display:flex; gap:8px; margin-top:16px}
  .typebar input{flex:1; padding:11px 14px; border:1px solid #e5e7eb; border-radius:12px; font:inherit; font-size:14px; outline:none}
  .typebar input:focus{border-color:var(--accent)}
  .typebar button{padding:0 16px; border:none; border-radius:12px; background:var(--primary); color:#fff; font-weight:600; cursor:pointer}
  .err{color:#b91c1c; font-size:13px; margin-top:12px; min-height:18px}
  footer{margin-top:18px; font-size:11px; color:var(--muted)}
</style>
</head>
<body data-state="idle">
  <main class="card">
    <div class="brand"><span class="dot"></span><h1>VindIA</h1></div>
    <p class="sub">Assistant vocal — en français</p>

    <div class="orb-wrap">
      <span class="ring"></span>
      <button id="orb" class="orb">Parler</button>
    </div>

    <div class="state" id="state">Prêt</div>
    <p class="hint" id="hint">Appuie sur « Parler » et pose ta question à voix haute.</p>
    <div class="err" id="err"></div>

    <div class="transcript" id="transcript"></div>

    <div class="typebar">
      <input id="textInput" type="text" placeholder="…ou écris ton message" />
      <button id="sendBtn">Envoyer</button>
    </div>

    <footer>VindIA — cerveau Mistral · voix du navigateur</footer>
  </main>

<script>
(() => {
  const WEBHOOK = "https://n8n.faugere-davy.fr/webhook/vindia";
  const $ = (id) => document.getElementById(id);
  const body = document.body, orb = $('orb'), stateEl = $('state'), hint = $('hint'),
        errEl = $('err'), tr = $('transcript'), textInput = $('textInput'), sendBtn = $('sendBtn');

  const setState = (s, label) => { body.dataset.state = s; if (label !== undefined) stateEl.innerHTML = label; };
  const addLine = (who, text) => {
    tr.classList.add('show');
    const p = document.createElement('p');
    p.className = who;
    p.innerHTML = '<b>' + (who === 'ai' ? 'VindIA' : 'Toi') + '</b> : ' + text;
    tr.appendChild(p); tr.scrollTop = tr.scrollHeight;
  };

  // --- Synthèse vocale (voix FR du navigateur) ---
  let frVoice = null;
  function pickVoice() {
    const v = speechSynthesis.getVoices();
    frVoice = v.find(x => /fr-FR/i.test(x.lang)) || v.find(x => /^fr/i.test(x.lang)) || null;
  }
  if ('speechSynthesis' in window) {
    pickVoice();
    speechSynthesis.onvoiceschanged = pickVoice;
  }
  function speak(text) {
    if (!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'fr-FR'; if (frVoice) u.voice = frVoice; u.rate = 1.02;
    u.onstart = () => setState('speaking', '<span class="live">VindIA parle…</span>');
    u.onend = () => setState('idle', 'Prêt');
    speechSynthesis.speak(u);
  }

  // --- Envoi au cerveau (n8n + Mistral) ---
  async function ask(message) {
    addLine('you', message);
    setState('thinking', '<span class="live">VindIA réfléchit…</span>');
    orb.disabled = true;
    try {
      const r = await fetch(WEBHOOK, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      const reply = (data && data.reply) ? data.reply : "(réponse vide)";
      addLine('ai', reply);
      speak(reply);
    } catch (e) {
      errEl.textContent = "Problème de connexion : " + (e.message || e);
      setState('idle', 'Prêt');
    } finally {
      orb.disabled = false;
    }
  }

  // --- Reconnaissance vocale (STT navigateur) ---
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recog = null, listening = false;
  if (SR) {
    recog = new SR();
    recog.lang = 'fr-FR'; recog.interimResults = false; recog.maxAlternatives = 1;
    recog.onresult = (ev) => {
      const txt = ev.results[0][0].transcript.trim();
      if (txt) ask(txt);
    };
    recog.onerror = (ev) => {
      if (ev.error !== 'no-speech' && ev.error !== 'aborted')
        errEl.textContent = "Micro : " + ev.error;
      setState('idle', 'Prêt');
    };
    recog.onend = () => { listening = false; if (body.dataset.state === 'listening') setState('idle', 'Prêt'); };
  } else {
    hint.textContent = "Reconnaissance vocale non dispo sur ce navigateur — utilise la saisie texte ci-dessous.";
  }

  orb.addEventListener('click', () => {
    errEl.textContent = '';
    if (!recog) { textInput.focus(); return; }
    if (listening) { recog.stop(); return; }
    try {
      speechSynthesis && speechSynthesis.cancel();
      recog.start(); listening = true;
      setState('listening', '<span class="live">À l\'écoute…</span>');
    } catch (e) { /* start déjà en cours */ }
  });

  function sendText() {
    const m = textInput.value.trim();
    if (!m) return;
    textInput.value = '';
    ask(m);
  }
  sendBtn.addEventListener('click', sendText);
  textInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendText(); });
})();
</script>
</body>
</html>
